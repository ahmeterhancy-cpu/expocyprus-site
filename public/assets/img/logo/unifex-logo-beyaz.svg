<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1400 500"
     preserveAspectRatio="xMidYMid meet"
     role="img"
     aria-label="UNIFEX – Beyaz/Negatif versiyon (koyu zeminde kullanım)">
  <title>UNIFEX Logo (Beyaz / Negatif)</title>
  <desc>Koyu zeminlerde, fotoğraf üstünde, fuar duvarında kullanılır.</desc>

  <!-- Görüntülenirken koyu zemin lazım — placeholder rect (export sırasında silinmeli) -->
  <rect width="1400" height="500" fill="#0A0A0A"/>

  <defs>
    <clipPath id="uLeftW">
      <rect x="0" y="0" width="175" height="360"/>
    </clipPath>
    <clipPath id="uRightW">
      <rect x="175" y="0" width="180" height="360"/>
    </clipPath>
  </defs>

  <g id="u-mark" transform="translate(80,70)">
    <!-- Sol yarı: kırmızı (vurgu için kalır) -->
    <path fill="#E30613" clip-path="url(#uLeftW)"
          d="M 0,0 L 90,0 L 90,210 C 90,250 120,275 175,275
             C 230,275 260,250 260,210 L 260,0 L 350,0 L 350,220
             C 350,300 270,350 175,350 C 80,350 0,300 0,220 Z"/>
    <!-- Sağ yarı: beyaz -->
    <path fill="#FFFFFF" clip-path="url(#uRightW)"
          d="M 0,0 L 90,0 L 90,210 C 90,250 120,275 175,275
             C 230,275 260,250 260,210 L 260,0 L 350,0 L 350,220
             C 350,300 270,350 175,350 C 80,350 0,300 0,220 Z"/>
    <g fill="none" stroke="#E30613" stroke-width="3" stroke-linecap="round">
      <path d="M 100,100 Q 175,120 250,100"/>
      <path d="M 95,165 Q 175,195 255,165"/>
      <path d="M 100,225 Q 175,255 250,225"/>
    </g>
    <line x1="175" y1="40" x2="175" y2="270" stroke="#FFFFFF" stroke-width="2" opacity="0.45"/>
  </g>

  <line x1="510" y1="60" x2="510" y2="430" stroke="#FFFFFF" stroke-width="2"/>

  <g font-family="'Arial Black','Helvetica Neue',Impact,sans-serif"
     font-weight="900" font-size="180" letter-spacing="-3">
    <text x="540" y="310" fill="#E30613">UNI</text>
    <text x="900" y="310" fill="#FFFFFF">FEX</text>
    <rect x="813" y="328" width="55" height="10" fill="#E30613"/>
  </g>

  <g font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
     font-size="36" font-weight="400" letter-spacing="3" fill="#FFFFFF">
    <text x="540" y="400">Expo</text>
    <circle cx="667" cy="389" r="5" fill="#E30613"/>
    <text x="690" y="400">Congress</text>
    <circle cx="908" cy="389" r="5" fill="#E30613"/>
    <text x="930" y="400">Events</text>
    <circle cx="1093" cy="389" r="5" fill="#E30613"/>
    <text x="1115" y="400">Stands</text>
  </g>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 400 400"
     preserveAspectRatio="xMidYMid meet"
     role="img"
     aria-label="UNIFEX U-Mark">
  <title>UNIFEX U-Mark (Sadece İkon)</title>
  <desc>Avatar, favicon, watermark için kullanılacak yalnız ikon.</desc>

  <defs>
    <clipPath id="markLeft">
      <rect x="0" y="0" width="175" height="360"/>
    </clipPath>
    <clipPath id="markRight">
      <rect x="175" y="0" width="180" height="360"/>
    </clipPath>
  </defs>

  <g transform="translate(25,25)">
    <path fill="#E30613" clip-path="url(#markLeft)"
          d="M 0,0 L 90,0 L 90,210 C 90,250 120,275 175,275
             C 230,275 260,250 260,210 L 260,0 L 350,0 L 350,220
             C 350,300 270,350 175,350 C 80,350 0,300 0,220 Z"/>

    <path fill="#0A0A0A" clip-path="url(#markRight)"
          d="M 0,0 L 90,0 L 90,210 C 90,250 120,275 175,275
             C 230,275 260,250 260,210 L 260,0 L 350,0 L 350,220
             C 350,300 270,350 175,350 C 80,350 0,300 0,220 Z"/>

    <g fill="none" stroke="#E30613" stroke-width="3" stroke-linecap="round">
      <path d="M 100,100 Q 175,120 250,100"/>
      <path d="M 95,165 Q 175,195 255,165"/>
      <path d="M 100,225 Q 175,255 250,225"/>
    </g>

    <line x1="175" y1="40" x2="175" y2="270" stroke="#0A0A0A" stroke-width="2" opacity="0.45"/>
  </g>
</svg>

<section class="ab-hero-form">
    <div class="ab-hero-form-bg" style="background-image: url('/uploads/pagebuilder/placeholder.jpg');"></div>
    <div class="ab-hero-form-overlay"></div>
    <div class="ab-container">
        <div class="ab-hero-form-grid">
            <div class="ab-hero-form-text">
                <span class="ab-eyebrow" phpb-content-container="true">ÜCRETSİZ DANIŞMANLIK</span>
                <h1 class="ab-hero-form-title">
                    <span phpb-content-container="true">Stand teklifinizi</span>
                    <span class="ab-line-accent" phpb-content-container="true">bugün alın.</span>
                </h1>
                <p class="ab-hero-form-lead" phpb-content-container="true">Fuar veya kongre için stand çözümlerimizden faydalanın. 24 saat içinde özel teklif alın.</p>
                <ul class="ab-hero-form-usps">
                    <li phpb-content-container="true">✓ 22 yıllık deneyim</li>
                    <li phpb-content-container="true">✓ Anahtar teslim çözüm</li>
                    <li phpb-content-container="true">✓ Ücretsiz keşif</li>
                </ul>
            </div>
            <form action="/iletisim" method="POST" class="ab-form ab-form-card">
                <h3 class="ab-form-card-title" phpb-content-container="true">Ücretsiz Teklif Al</h3>
                <div class="ab-form-group">
                    <input type="text" name="name" placeholder="Ad Soyad *" class="ab-form-input" required>
                </div>
                <div class="ab-form-group">
                    <input type="email" name="email" placeholder="E-posta *" class="ab-form-input" required>
                </div>
                <div class="ab-form-group">
                    <input type="tel" name="phone" placeholder="Telefon" class="ab-form-input">
                </div>
                <div class="ab-form-group">
                    <textarea name="message" placeholder="Projeniz hakkında kısaca bilgi verin" rows="3" class="ab-form-input"></textarea>
                </div>
                <button type="submit" class="ab-btn ab-btn-primary ab-btn-block" phpb-content-container="true">Teklif İste</button>
            </form>
        </div>
    </div>
</section>

<section class="ab-newsletter">
    <div class="ab-container">
        <div class="ab-newsletter-card">
            <div class="ab-newsletter-text">
                <h3 class="ab-newsletter-title" phpb-content-container="true">Fuarlardan haberdar olun.</h3>
                <p class="ab-newsletter-sub" phpb-content-container="true">Yaklaşan fuarlar ve özel tekliflerden ilk siz haberdar olun. Ayda 1-2 e-posta, spam yok.</p>
            </div>
            <form action="/iletisim" method="POST" class="ab-newsletter-form">
                <input type="hidden" name="form_type" value="newsletter">
                <input type="hidden" name="message" value="Bülten aboneliği talebi">
                <input type="hidden" name="name" value="Bülten Abonesi">
                <input type="email" name="email" placeholder="E-posta adresiniz" class="ab-newsletter-input" required>
                <button type="submit" class="ab-btn ab-btn-primary" phpb-content-container="true">Abone Ol</button>
            </form>
        </div>
    </div>
</section>
